        <nav class="nav-links">
            <a href="/" class="nav-link" id="nav-home">Home</a>
            <a href="/controls" class="nav-link" id="nav-controls">Controls</a>
        </nav>
    </div>
</div>

<script>
    // Highlight the active nav link
    (function () {
        const path = window.location.pathname.replace(/\/$/, '') || '/';
        document.querySelectorAll('.nav-link').forEach(function (link) {
            const href = link.getAttribute('href').replace(/\/$/, '') || '/';
            if (path === href || (href !== '' && path.startsWith(href + '/'))) {
                link.classList.add('active-nav');
            }
        });
        // Always mark home if on root
        if (path === '' || path === '/') {
            document.getElementById('nav-home').classList.add('active-nav');
        }
    })();
</script>

<div class="ui bottom attached tab segment " data-tab="requester">

<form action="" id="template_request_form" class="ui mini form">

  <div class="ui two fields">

    <div class="field">
      <label>Location:</label>
      <textarea id="location_value" name="location_value" rows="3" placeholder="Enter Address"></textarea>
    </div>

    <div class="field">
      <label for="service_detail">Service Type</label>
      <textarea id="service_detail" name="service_detail" rows="3" placeholder="Enter Service Detail"></textarea>
    </div>
  </div>

  <div class="inline fields">
    <label>Today?</label>
    <div class="field">

    </div>
    <label>Soonest?</label>

  </div>

    <div class="field">

</form>
