<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>

  <!-- Load jQuery First -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- Load Fomantic UI JS -->
  <script src="https://cdn.jsdelivr.net/npm/fomantic-ui@2.9.4/dist/semantic.min.js"></script>

  <!-- Load Clipboard JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/clipboard.js/2.0.11/clipboard.min.js"></script>

  
  <script src="/assets/js/formatter.js" defer></script>
  <script src="/assets/js/requester.js" defer></script>
  <script src="/assets/js/semantic_init.js" defer></script>
  <script src="/assets/js/clipboard.js" defer></script>



  <!-- Load Fomantic UI CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fomantic-ui@2.9.4/dist/semantic.min.css">

  
  <link rel="stylesheet" href="../../assets/css/controls.css">
  <link rel="stylesheet" href="../../assets/css/formatter.css">
</head>

<body>

  
<div class="ui inverted menu borderless" style="justify-content: center; border-radius: 0; top: 0; position: sticky; z-index: 1;">
    <div class="header item">
        Customblade
    </div>
</div>



  <main class="ui container">
    
<div class="mini ui top attached tabular menu">
    <a class="item active " data-tab="formatter">Formatter</a>
    <a class="item" data-tab="requester">Requester</a>
    <a class="item" data-tab="addons">Addons</a>
    
    
</div>


<div class="ui bottom attached tab segment active " data-tab="formatter">
    <link rel="stylesheet" href="css/formatter.css">

<h1>Formatter</h1>

<form action="" id="template_form" class="ui mini form">

  
  <div class="field">
    <label for="full_name">Full Name:</label>
    <input type="text" id="full_name" name="Full Name" />
  </div>

  
  <div class="field">
    <label for="phone_number">Phone Number:</label>
    <input type="number" id="phone_number" name="Phone Numberr" />
  </div>

  <div class="field">

    <label for="concern_select">Concern</label>
    <select class="ui fluid dropdown" name="Concern" id="concern_select">
      

      <option value="" disabled selected>Select an option</option>

      <option value="">Select Concern</option>
      
      
      
      <option value="OMT-NA">OMT-NA</option>
      
      
      
      <option value="OMT-DELAY">OMT-DELAY</option>
      
      
      
      
      
      
      
      <option value="OMT-NA-MDSC">OMT-NA-MDSC</option>
      
      
      
      
      
      <option value="OMT-NA-PACKAGE">OMT-NA-PACKAGE</option>
      
      
    </select>

  </div>

  <div class="mini two ui buttons" id="button_group">

    <button type="button" id="showValueBtn" class="ui button" onClick="showValues()">
      Convert
    </button>
    <button type="button" class="ui button negative" onclick="clearConverterForm()">Clear</button>

  </div>
</form>


<div class="ui basic segments" id="ui_feedback">

  <div class="ui blue segment">
    <p id="display_value">
      Full Name: <br>
      Phone Number: <br>
      Concern:
    </p>
  </div>
</div>

<button class="ui mini primary button btn" data-clipboard-target="#display_value">
  <i class="ui icon clipboard"></i>Copy to Clipboard
</button>
</div>
<div class="ui bottom attached tab segment " data-tab="requester">
    <h1>Request Formatter</h1>

<form action="" id="template_request_form" class="ui mini form">

  <div class="ui two fields">

    <div class="field">
      <label>Location:</label>
      <textarea id="location_value" rows="3" placeholder="Enter Address"></textarea>
    </div>

    <div class="field">
      <label for="service_detail">Service Type</label>
      <textarea id="service_detail" rows="3" placeholder="Enter Service Detail"></textarea>
    </div>
  </div>

  <div class="inline fields">
    <label>Today?</label>
    <div class="field">
      <div class="ui  checkbox checked">
        <input type="checkbox" id="today_yes" name="check_date" onchange="checkToday()" tabindex="0">
        <label>Yes</label>
      </div>
    </div>
    <label>Soonest?</label>
    <div class="field">
      <div class="ui  checkbox checked">
        <input type="checkbox" id="soonest_yes" name="check_date" onchange="checkSoonest()" tabindex="0">
        <label>Yes</label>
      </div>
    </div>

  </div>


  <div class="two fields">
    <div class="field">
      <label>Date</label>
      <div class="ui calendar" id="date_calendar">
        <div class="ui input left icon">
          <i class="calendar icon"></i>
          <input type="text" placeholder="Date" id="date_value" required>
        </div>
      </div>
    </div>
    <div class="field">
      <label>Time</label>
      <div class="ui calendar" id="time_calendar">
        <div class="ui input left icon">
          <i class="time icon"></i>
          <input type="text" placeholder="Time" id="time_value" required>
        </div>
      </div>
    </div>
  </div>

  <div class="two mini ui buttons">

    <button type="button" id="showValueBtn" class="ui button" onClick="showReqValues()">
      Format
    </button>
    <button type="button" class="ui button negative" onclick="clearForm()">Clear</button>

  </div>
</form>

<div class="ui basic segments">

  <div id="displayReq_value" class="ui blue segment">
  </div>

</div>
<button class="ui mini primary button btn" data-clipboard-target="#displayReq_value">
  <i class="ui icon clipboard"></i>Copy to Clipboard
</button>

<script src="/assets/js/requester.js"></script>
</div>
<div class="ui bottom attached tab segment " data-tab="addons">
    <h1>Addons</h1>
<table class="ui striped selectable small table">
  <thead>
    <tr>
      <th class="four wide">Name</th>
      <th>Duration</th>
      <th>Max Unit Purchase</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td data-label="Name">Balcony Cleaning</td>
      <td data-label="Name">15</td>
      <td data-label="Name">5</td>
    </tr>
    <tr>
      <td data-label="Name">Cupboard Cleaning</td>
      <td data-label="Name">45</td>
      <td data-label="Name">5</td>
    </tr>
    <tr>
      <td data-label="Name">Ironing and Folding</td>
      <td data-label="Name">30</td>
      <td data-label="Name">5</td>
    </tr>
    <tr>
      <td data-label="Name">Fridge Cleaning</td>
      <td data-label="Name">45</td>
      <td data-label="Name">5</td>
    </tr>
    <tr>
      <td data-label="Name">Wardrobe Cleaning</td>
      <td data-label="Name">45</td>
      <td data-label="Name">5</td>
    </tr>
  </tbody>
</table>
</div>


  </main>
</body>

</html>
